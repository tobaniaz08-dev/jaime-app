<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaime Control Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans p-4 select-none">

    <div class="text-center mb-6 border-b border-slate-800 pb-4">
        <h1 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">JAIME DASHBOARD</h1>
        <p id="user-welcome" class="text-xs text-slate-400 mt-1">Авторизация...</p>
    </div>

    <div id="access-denied" class="hidden text-center py-12">
        <span class="text-4xl">🚫</span>
        <h2 class="text-lg font-bold text-red-500 mt-2">Доступ ограничен</h2>
        <p class="text-xs text-slate-400 mt-1">Вашего Юзернейма нет в Белом Списке системы.</p>
    </div>

    <div id="admin-panel" class="hidden space-y-4">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4">
            <h3 class="text-sm font-bold text-blue-400 mb-3 flex items-center gap-1.5">🛡️ МЕНЕДЖМЕНТ ПОЛЬЗОВАТЕЛЕЙ</h3>
            
            <div class="space-y-3 text-xs">
                <div>
                    <label class="block text-slate-400 mb-1">Telegram Юзернейм цели:</label>
                    <input id="target-username" type="text" placeholder="@username" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 outline-none text-white focus:border-blue-500">
                </div>
                
                <button onclick="sendAction('ban')" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 rounded-xl transition">
                    Забанить нарушителя
                </button>
            </div>
        </div>
    </div>

    <div id="owner-panel" class="hidden space-y-4 mt-4">
        <div class="bg-gradient-to-b from-slate-900 to-indigo-950 border border-indigo-900/60 rounded-2xl p-4">
            <h3 class="text-sm font-bold text-amber-400 mb-3 flex items-center gap-1.5">👑 УПРАВЛЕНИЕ СИСТЕМОЙ (OWNER)</h3>
            
            <div class="space-y-3 text-xs">
                <div>
                    <label class="block text-amber-500/80 mb-1">Срок Premium подписки (дней, макс 365):</label>
                    <input id="premium-days" type="number" value="365" max="365" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 outline-none text-white">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <button onclick="sendAction('premium')" class="bg-amber-500 text-slate-950 font-bold py-2.5 rounded-xl">Выдать Premium</button>
                    <button onclick="sendAction('hardban')" class="bg-red-950 text-red-400 border border-red-800 font-bold py-2.5 rounded-xl">💥 Полный ХардБан</button>
                </div>

                <hr class="border-slate-800 my-2">

                <div class="grid grid-cols-2 gap-2">
                    <button onclick="sendAction('add_admin')" class="bg-emerald-600 text-white font-bold py-2 rounded-xl">➕ Назначить Админа</button>
                    <button onclick="sendAction('remove_admin')" class="bg-slate-800 text-slate-400 font-bold py-2 rounded-xl">🛑 Уволить Админа</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Парсим параметры из URL, переданные ботом
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role'); // owner / admin
        const username = urlParams.get('user');

        const welcomeEl = document.getElementById('user-welcome');
        const adminPanel = document.getElementById('admin-panel');
        const ownerPanel = document.getElementById('owner-panel');
        const deniedScreen = document.getElementById('access-denied');

        if (role === 'owner') {
            welcomeEl.innerText = `Вход выполнен: @${username} (Владелец)`;
            adminPanel.classList.remove('hidden');
            ownerPanel.classList.remove('hidden');
        } else if (role === 'admin') {
            welcomeEl.innerText = `Вход выполнен: @${username} (Администратор)`;
            adminPanel.classList.remove('hidden');
        } else {
            deniedScreen.classList.remove('hidden');
            welcomeEl.innerText = 'Доступ заблокирован.';
        }

        function sendAction(actionType) {
            const target = document.getElementById('target-username').value.trim();
            const days = document.getElementById('premium-days') ? document.getElementById('premium-days').value : 365;

            if (!target) {
                alert("Укажите юзернейм пользователя!");
                return;
            }

            // Формируем пакет данных для отправки обратно в чат бота
            const dataPacket = {
                action: actionType,
                target: target,
                days: days
            };

            // Отправляем данные боту и закрываем окно панели
            tg.sendData(JSON.stringify(dataPacket));
            tg.close();
        }
    </script>
</body>
</html>
