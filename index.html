<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaime Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color, #18181b); color: var(--tg-theme-text-color, #ffffff); }
        .tg-btn { background-color: var(--tg-theme-button-color, #2563eb); color: var(--tg-theme-button-text-color, #ffffff); }
    </style>
</head>
<body class="font-sans h-screen flex flex-col justify-between p-4">

    <div class="flex items-center justify-between border-b border-zinc-700 pb-2 mb-2">
        <h1 class="text-xl font-bold text-blue-400">🤖 Jaime SuperApp</h1>
        <span id="user-name" class="text-sm text-zinc-400">@user</span>
    </div>

    <div id="chat-screen" class="flex-1 flex flex-col justify-between overflow-hidden">
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-2 p-2 bg-zinc-900/50 rounded-lg mb-2 text-sm">
            <div class="text-zinc-400">Джайм готов на GitHub Pages. Задай мне задачу...</div>
        </div>
        <div class="flex gap-2">
            <input id="chat-input" type="text" placeholder="Спроси Джайма..." class="flex-1 bg-zinc-800 border border-zinc-700 rounded-lg p-2 text-white outline-none">
            <button onclick="sendToAi()" class="tg-btn px-4 py-2 rounded-lg font-bold">-></button>
        </div>
    </div>

    <div id="music-screen" class="flex-1 flex flex-col justify-between overflow-hidden hidden">
        <div class="flex gap-2 mb-2">
            <input id="music-input" type="text" placeholder="Исполнитель или трек..." class="flex-1 bg-zinc-800 border border-zinc-700 rounded-lg p-2 text-white outline-none">
            <button onclick="searchMusic()" class="tg-btn px-4 py-2 rounded-lg font-bold">Поиск</button>
        </div>
        <div id="music-results" class="flex-1 overflow-y-auto space-y-2 p-2 bg-zinc-900/50 rounded-lg text-sm">
            <div class="text-zinc-400 text-center pt-4">Здесь появятся найденные треки</div>
        </div>
    </div>

    <div class="flex justify-around border-t border-zinc-700 pt-3 mt-2">
        <button onclick="switchTab('chat')" id="tab-chat" class="text-blue-400 font-bold flex flex-col items-center text-xs">
            <span>🧠</span><span>Интеллект</span>
        </button>
        <button onclick="switchTab('music')" id="tab-music" class="text-zinc-400 font-bold flex flex-col items-center text-xs">
            <span>🎵</span><span>Музыка</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        if(tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = "@" + (tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name);
        }

        function switchTab(tab) {
            if(tab === 'chat') {
                document.getElementById('chat-screen').classList.remove('hidden');
                document.getElementById('music-screen').classList.add('hidden');
                document.getElementById('tab-chat').classList.add('text-blue-400');
                document.getElementById('tab-music').classList.remove('text-blue-400');
            } else {
                document.getElementById('chat-screen').classList.add('hidden');
                document.getElementById('music-screen').classList.remove('hidden');
                document.getElementById('tab-music').classList.add('text-blue-400');
                document.getElementById('tab-chat').classList.remove('text-blue-400');
            }
        }

        // Запрос к ИИ напрямую из браузера
        async function sendToAi() {
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            if(!input.value.trim()) return;

            const userText = input.value;
            chatBox.innerHTML += `<div class="text-right"><span class="bg-blue-600 px-3 py-1.5 rounded-lg inline-block max-w-[80%] text-white">${userText}</span></div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        messages: [
                            {role: "system", content: "Ты — Джайм, суперинтеллект. Отвечай коротко, емко и по делу."},
                            {role: "user", content: userText}
                        ],
                        model: "qwen",
                        jsonMode: false
                    })
                });
                const replyText = await response.text();
                chatBox.innerHTML += `<div class="text-left"><span class="bg-zinc-800 px-3 py-1.5 rounded-lg inline-block max-w-[80%] text-zinc-200"><b>Джайм:</b> ${replyText}</span></div>`;
            } catch (err) {
                chatBox.innerHTML += `<div class="text-left"><span class="bg-red-900/50 px-3 py-1.5 rounded-lg inline-block text-red-300">Ошибка сети. Попробуй еще раз.</span></div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Поиск музыки напрямую через iTunes API (поддерживает CORS)
        async function searchMusic() {
            const input = document.getElementById('music-input');
            const resultsBox = document.getElementById('music-results');
            if(!input.value.trim()) return;

            resultsBox.innerHTML = '<div class="text-center text-zinc-400">Ищу треки...</div>';

            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(input.value)}&media=music&limit=5`);
                const data = await res.json();
                resultsBox.innerHTML = '';

                if(data.results && data.results.length > 0) {
                    data.results.forEach(track => {
                        resultsBox.innerHTML += `
                            <div class="bg-zinc-800 p-2 rounded-lg flex flex-col gap-1 border border-zinc-700">
                                <div class="font-bold text-white">${track.artistName} — ${track.trackName}</div>
                                <audio src="${track.previewUrl}" controls class="w-full h-8 mt-1 rounded bg-zinc-700"></audio>
                            </div>
                        `;
                    });
                } else {
                    resultsBox.innerHTML = '<div class="text-center text-zinc-500">Ничего не найдено</div>';
                }
            } catch(e) {
                resultsBox.innerHTML = '<div class="text-center text-red-400">Ошибка поиска музыки</div>';
            }
        }
    </script>
</body>
</html>
