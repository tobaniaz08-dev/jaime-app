<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaime Control Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans p-4 select-none">

    <div class="text-center mb-4 border-b border-slate-800 pb-3">
        <h1 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">JAIME DASHBOARD</h1>
        <p id="user-welcome" class="text-xs text-slate-400 mt-1">Авторизация...</p>
    </div>

    <div id="role-selector" class="hidden grid grid-cols-2 gap-2 mb-4 bg-slate-900 p-1 rounded-xl border border-slate-800 text-xs">
        <button id="btn-tab-admin" onclick="switchTab('admin')" class="py-2.5 rounded-lg font-bold transition bg-slate-800 text-white border border-blue-500/30">🛡️ Админ Панель</button>
        <button id="btn-tab-owner" onclick="switchTab('owner')" class="py-2.5 rounded-lg font-bold text-slate-400 transition">👑 Овнер Панель</button>
    </div>

    <div id="access-denied" class="hidden text-center py-12">
        <span class="text-4xl">🚫</span>
        <h2 class="text-lg font-bold text-red-500 mt-2">Доступ ограничен</h2>
        <p class="text-xs text-slate-400 mt-1">Вашего Юзернейма нет в Белом Списке системы.</p>
    </div>

    <div id="target-container" class="hidden bg-slate-900 border border-slate-800 rounded-2xl p-4 mb-4">
        <label class="block text-slate-400 text-xs mb-1.5 font-medium">Telegram Юзернейм пользователя:</label>
        <input id="target-username" type="text" placeholder="@username" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 outline-none text-sm text-white focus:border-blue-500 transition">
    </div>

    <div id="admin-panel" class="hidden space-y-3">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 space-y-2">
            <h3 class="text-xs font-bold text-blue-400 uppercase tracking-wider mb-2">Действия Модерации</h3>
            <button onclick="sendAction('ban')" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl text-xs transition">
                Забанить нарушителя
            </button>
        </div>
    </div>

    <div id="owner-panel" class="hidden space-y-4">
        <div class="bg-gradient-to-b from-slate-900 to-indigo-950 border border-indigo-900/60 rounded-2xl p-4 space-y-3">
            <h3 class="text-xs font-bold text-amber-400 uppercase tracking-wider mb-1">Управление Подписками и Правами</h3>
            
            <div class="space-y-1">
                <label class="block text-amber-500/80 text-[11px]">Срок выдачи Premium (в днях):</label>
                <input id="premium-days" type="number" value="365" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-xs outline-none text-white">
            </div>

            <div class="grid grid-cols-2 gap-2 text-xs">
                <button onclick="sendAction('premium')" class="bg-amber-500 hover:bg-amber-600 text-slate-950 font-black py-2.5 rounded-xl transition">Выдать Premium</button>
                <button onclick="sendAction('unpremium')" class="bg-red-950 text-red-400 border border-red-800/60 font-bold py-2.5 rounded-xl transition">❌ Снять Premium</button>
            </div>

            <hr class="border-slate-800 my-1">

            <div class="grid grid-cols-2 gap-2 text-xs">
                <button onclick="sendAction('unban')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl transition">🟢 Разбанить</button>
                <button onclick="sendAction('hardban')" class="bg-red-900/40 text-red-300 border border-red-700 font-bold py-2.5 rounded-xl transition">💥 ХардБан</button>
            </div>

            <hr class="border-slate-800 my-1">

            <div class="grid grid-cols-2 gap-2 text-xs">
                <button onclick="sendAction('add_admin')" class="bg-slate-800 border border-slate-700 text-white font-medium py-2 rounded-xl transition">➕ Назначить Админа</button>
                <button onclick="sendAction('remove_admin')" class="bg-slate-950 border border-slate-800 text-slate-400 py-2 rounded-xl transition">🛑 Уволить Админа</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role'); 
        const username = urlParams.get('user');

        const welcomeEl = document.getElementById('user-welcome');
        const roleSelector = document.getElementById('role-selector');
        const targetContainer = document.getElementById('target-container');
        const adminPanel = document.getElementById('admin-panel');
        const ownerPanel = document.getElementById('owner-panel');
        const deniedScreen = document.getElementById('access-denied');

        // Логика распределения прав доступа при запуске
        if (role === 'owner') {
            welcomeEl.innerText = `Вход: @${username} (Владелец)`;
            roleSelector.classList.remove('hidden'); 
            targetContainer.classList.remove('hidden');
            adminPanel.classList.remove('hidden'); // По дефолту открыта вкладка админа
        } else if (role === 'admin') {
            welcomeEl.innerText = `Вход: @${username} (Администратор)`;
            targetContainer.classList.remove('hidden');
            adminPanel.classList.remove('hidden');
        } else {
            deniedScreen.classList.remove('hidden');
            welcomeEl.innerText = 'Доступ заблокирован.';
        }

        // Интерактивное переключение вкладок для Владельца
        function switchTab(targetTab) {
            const btnAdmin = document.getElementById('btn-tab-admin');
            const btnOwner = document.getElementById('btn-tab-owner');

            if (targetTab === 'admin') {
                adminPanel.classList.remove('hidden');
                ownerPanel.classList.add('hidden');
                btnAdmin.className = "py-2.5 rounded-lg font-bold transition bg-slate-800 text-white border border-blue-500/30";
                btnOwner.className = "py-2.5 rounded-lg font-bold text-slate-400 transition";
            } else {
                adminPanel.classList.add('hidden');
                ownerPanel.classList.remove('hidden');
                btnOwner.className = "py-2.5 rounded-lg font-bold transition bg-slate-800 text-white border border-amber-500/30";
                btnAdmin.className = "py-2.5 rounded-lg font-bold text-slate-400 transition";
            }
        }

        function sendAction(actionType) {
            const target = document.getElementById('target-username').value.trim();
            const days = document.getElementById('premium-days') ? document.getElementById('premium-days').value : 365;

            if (!target) {
                alert("Пожалуйста, укажите юзернейм целевого пользователя!");
                return;
            }

            const dataPacket = {
                action: actionType,
                target: target,
                days: days
            };

            tg.sendData(JSON.stringify(dataPacket));
            tg.close();
        }
    </script>
</body>
</html>
