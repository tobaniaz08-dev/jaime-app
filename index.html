<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaime Ultimate App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color, #0f172a); color: var(--tg-theme-text-color, #f8fafc); }
        .tg-btn { background-color: var(--tg-theme-button-color, #3b82f6); color: var(--tg-theme-button-text-color, #ffffff); }
        .premium-border { border: 2px solid #eab308; box-shadow: 0 0 10px rgba(234, 179, 8, 0.3); }
    </style>
</head>
<body class="font-sans h-screen flex flex-col justify-between p-3 overflow-hidden">

    <div id="header-panel" class="bg-slate-900 p-3 rounded-xl flex items-center justify-between mb-2 border border-slate-800">
        <div class="flex flex-col">
            <div class="flex items-center gap-1.5">
                <span>🤖</span>
                <h1 class="text-md font-bold text-blue-400" id="user-title">Jaime App</h1>
                <span id="premium-badge" class="hidden bg-amber-500 text-slate-950 text-[10px] font-black px-1.5 py-0.5 rounded">PREMIUM</span>
            </div>
            <span id="user-name" class="text-xs text-slate-400">@loading...</span>
        </div>
        <div class="text-right flex flex-col items-end">
            <span id="timer-label" class="text-[10px] text-slate-400 uppercase tracking-wider">Тест Премиума:</span>
            <span id="premium-timer" class="text-xs font-mono text-amber-400 font-bold">00:00:00</span>
        </div>
    </div>

    <div id="screen-chat" class="flex-1 flex flex-col justify-between overflow-hidden">
        <div class="grid grid-cols-3 gap-1 mb-2 bg-slate-950 p-1 rounded-lg text-xs border border-slate-800">
            <button onclick="setAiMode('fast')" id="btn-mode-fast" class="py-1 rounded font-medium bg-blue-600 text-white">Быстрый ⚡</button>
            <button onclick="setAiMode('thinking')" id="btn-mode-thinking" class="py-1 rounded font-medium text-slate-400">Думающий 🧠</button>
            <button onclick="setAiMode('premium')" id="btn-mode-premium" class="py-1 rounded font-medium text-slate-400">🌟 Премиум</button>
        </div>
        
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-2.5 p-2 bg-slate-950 rounded-xl mb-2 text-xs border border-slate-900">
            <div class="text-slate-400 italic">Джайм активирован. Задай вопрос или отправь задачу на код...</div>
        </div>
        
        <div class="flex gap-2 bg-slate-900 p-1.5 rounded-xl border border-slate-800">
            <input id="chat-input" type="text" placeholder="Задай вопрос Джайму..." class="flex-1 bg-transparent px-2 text-slate-200 text-xs outline-none">
            <button onclick="sendToAi()" class="tg-btn px-4 py-2 rounded-lg font-bold text-xs">-></button>
        </div>
    </div>

    <div id="screen-music" class="flex-1 flex flex-col justify-between overflow-hidden hidden">
        <div class="bg-slate-900 p-2 rounded-xl border border-slate-800 space-y-2 mb-2">
            <div class="text-[11px] text-amber-400 flex justify-between">
                <span>Лимит поиска: <b id="music-limit-txt">5</b></span>
                <span class="text-slate-400">Полные треки</span>
            </div>
            <div class="flex gap-2">
                <input id="music-input" type="text" placeholder="Песня или исполнитель..." class="flex-1 bg-slate-950 border border-slate-800 rounded-lg p-2 text-xs text-white outline-none">
                <button onclick="searchMusic()" class="tg-btn px-3 py-2 rounded-lg font-bold text-xs">Поиск</button>
            </div>
        </div>
        <div id="music-results" class="flex-1 overflow-y-auto space-y-2 p-1 text-xs">
            <div class="text-slate-500 text-center pt-8">Введи запрос для поиска музыки...</div>
        </div>
    </div>

    <div id="screen-media" class="flex-1 flex flex-col justify-between overflow-hidden hidden">
        <div class="bg-slate-900 p-3 rounded-xl border border-slate-800 space-y-2.5">
            <div class="text-[11px] text-amber-400 flex justify-between">
                <span>Лимит генераций: <b id="media-limit-txt">3</b></span>
                <span>Pollinations</span>
            </div>
            <textarea id="media-prompt" placeholder="Опишите картинку на английском..." class="w-full h-16 bg-slate-950 border border-slate-800 rounded-lg p-2 text-xs text-white outline-none resize-none"></textarea>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="generateMedia('photo')" class="bg-indigo-600 text-white py-2 rounded-lg font-bold text-xs">📸 Создать Фото</button>
                <button onclick="generateMedia('video')" class="bg-amber-500 text-slate-950 py-2 rounded-lg font-bold text-xs">🎥 Создать Видео</button>
            </div>
        </div>
        <div id="media-output" class="flex-1 flex items-center justify-center p-2 mt-2 bg-slate-950 rounded-xl border border-dashed border-slate-800 text-slate-500 text-center text-xs">
            Медиафайл появится здесь
        </div>
    </div>

    <div id="screen-settings" class="flex-1 flex flex-col justify-between overflow-hidden hidden">
        <div class="space-y-3 overflow-y-auto flex-1 p-1 text-xs">
            <div class="bg-gradient-to-r from-amber-600 to-yellow-500 p-3 rounded-xl text-slate-950">
                <h3 class="font-bold text-sm mb-1">⭐ ПОДДЕРЖКА И ДОНАТ</h3>
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <button onclick="buyPremium(30)" class="bg-slate-950 text-white p-2 rounded-lg font-bold text-[10px]">⭐️ 5 Звёзд = 1 Месяц</button>
                    <button onclick="buyPremium(365)" class="bg-slate-950 text-amber-400 p-2 rounded-lg font-bold text-[10px]">⭐️ 10 Звёзд = 1 Год</button>
                </div>
            </div>
            <button onclick="clearAppData()" class="w-full bg-red-950/60 border border-red-800 text-red-300 py-2 rounded-lg text-xs">🗑 Очистить кэш аккаунта</button>
        </div>
    </div>

    <div class="flex justify-around border-t border-slate-800 pt-2 bg-slate-950 p-1 rounded-xl">
        <button onclick="switchTab('chat')" id="nav-chat" class="text-blue-500 font-bold flex flex-col items-center text-[10px]">🧠 <span>Джайм</span></button>
        <button onclick="switchTab('music')" id="nav-music" class="text-slate-500 font-bold flex flex-col items-center text-[10px]">🎵 <span>Музыка</span></button>
        <button onclick="switchTab('media')" id="nav-media" class="text-slate-500 font-bold flex flex-col items-center text-[10px]">🎨 <span>Студия</span></button>
        <button onclick="switchTab('settings')" id="nav-settings" class="text-slate-500 font-bold flex flex-col items-center text-[10px]">⚙️ <span>Опции</span></button>
    </div>

    <script>
        // ЗАЩИТА №1: Безопасная инициализация Telegram WebApp
        let tg = null;
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            try { tg.expand(); } catch(e) {}
        }

        // ЗАЩИТА №2: Безопасное хранилище на случай блокировок браузера смартфона
        const memoryFallback = {};
        function safeGet(key, fallback) {
            try { return localStorage.getItem(key) !== null ? localStorage.getItem(key) : fallback; } 
            catch(e) { return memoryFallback[key] !== undefined ? memoryFallback[key] : fallback; }
        }
        function safeSet(key, value) {
            try { localStorage.setItem(key, value); } 
            catch(e) { memoryFallback[key] = value; }
        }

        let savedHistory = [];
        try { savedHistory = JSON.parse(safeGet('jaime_history', '[]')) || []; } catch(e) { savedHistory = []; }

        let appState = {
            premiumExpires: parseInt(safeGet('jaime_prem_exp', Date.now() + 24 * 60 * 60 * 1000)),
            photoLimits: parseInt(safeGet('jaime_lim_photo', 3)),
            musicLimits: parseInt(safeGet('jaime_lim_music', 5)),
            aiMode: safeGet('jaime_ai_mode', 'fast'),
            chatHistory: savedHistory
        };

        if (!safeGet('jaime_prem_exp', null)) safeSet('jaime_prem_exp', appState.premiumExpires);

        if(tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = "@" + (tg.initDataUnsafe.user.username || "user");
            document.getElementById('user-title').innerText = tg.initDataUnsafe.user.first_name;
        } else {
            document.getElementById('user-name').innerText = "@guest";
            document.getElementById('user-title').innerText = "Jaime User";
        }

        function updateLimitsUI() {
            const isPrem = appState.premiumExpires > Date.now();
            document.getElementById('media-limit-txt').innerText = isPrem ? "Безлимит ∞" : appState.photoLimits;
            document.getElementById('music-limit-txt').innerText = isPrem ? "Безлимит ∞" : appState.musicLimits;
        }

        // Фоновый счетчик времени
        setInterval(() => {
            const now = Date.now();
            const diff = appState.premiumExpires - now;
            if (diff > 0) {
                document.getElementById('premium-badge').classList.remove('hidden');
                document.getElementById('header-panel').classList.add('premium-border');
                const hrs = Math.floor(diff / (1000 * 60 * 60));
                const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('premium-timer').innerText = `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            } else {
                document.getElementById('premium-badge').classList.add('hidden');
                document.getElementById('header-panel').classList.remove('premium-border');
                document.getElementById('premium-timer').innerText = "Истёк";
                if(appState.aiMode === 'premium') setAiMode('fast');
            }
            updateLimitsUI();
        }, 1000);

        function buyPremium(days) {
            const addedTime = days * 24 * 60 * 60 * 1000;
            appState.premiumExpires = (appState.premiumExpires < Date.now()) ? (Date.now() + addedTime) : (appState.premiumExpires + addedTime);
            safeSet('jaime_prem_exp', appState.premiumExpires);
            alert(`🎉 Премиум активирован на ${days} дн.!`);
        }

        function switchTab(tab) {
            ['chat', 'music', 'media', 'settings'].forEach(t => {
                document.getElementById(`screen-${t}`).classList.add('hidden');
                document.getElementById(`nav-${t}`).classList.remove('text-blue-500');
                document.getElementById(`nav-${t}`).classList.add('text-slate-500');
            });
            document.getElementById(`screen-${tab}`).classList.remove('hidden');
            document.getElementById(`nav-${tab}`).classList.remove('text-slate-500');
            document.getElementById(`nav-${tab}`).classList.add('text-blue-500');
        }

        function setAiMode(mode) {
            if (mode === 'premium' && appState.premiumExpires <= Date.now()) {
                alert("🔒 Режим доступен только с Premium подпиской!");
                return;
            }
            ['fast', 'thinking', 'premium'].forEach(m => {
                const el = document.getElementById(`btn-mode-${m}`);
                if(el) {
                    el.classList.remove('bg-blue-600', 'bg-amber-500', 'text-white', 'text-slate-950');
                    el.classList.add('text-slate-400');
                }
            });
            appState.aiMode = mode;
            safeSet('jaime_ai_mode', mode);
            const btn = document.getElementById(`btn-mode-${mode}`);
            if(btn) {
                btn.classList.remove('text-slate-400');
                if(mode === 'premium') { btn.classList.add('bg-amber-500', 'text-slate-950'); } 
                else { btn.classList.add('bg-blue-600', 'text-white'); }
            }
        }

        async function sendToAi() {
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            if(!input.value.trim()) return;

            const userText = input.value;
            chatBox.innerHTML += `<div class="text-right"><span class="bg-blue-600 px-3 py-1.5 rounded-xl inline-block max-w-[85%] text-white text-left">${userText}</span></div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            let systemPrompt = "Ты — Джайм, суперинтеллект. Отвечай коротко.";
            let currentModel = "qwen";

            if (appState.aiMode === 'thinking') {
                systemPrompt = "Ты думающая модель. Сначала подробно проанализируй задачу шаг за шагом, а затем выдай структурированный ответ.";
                currentModel = "llama";
            } else if (appState.aiMode === 'premium') {
                systemPrompt = "Ты — Джайм Премиум. Пиши огромные, идеальные Python скрипты от 1000 до 1500+ строк кода без сокращений.";
                currentModel = "openai";
            }

            appState.chatHistory.push({role: "user", content: userText});
            if(appState.chatHistory.length > 10) appState.chatHistory.shift();

            try {
                const response = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ messages: [{role: "system", content: systemPrompt}, ...appState.chatHistory], model: currentModel, jsonMode: false })
                });
                const replyText = await response.text();
                appState.chatHistory.push({role: "assistant", content: replyText});
                safeSet('jaime_history', JSON.stringify(appState.chatHistory));

                const formattedReply = replyText.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");
                chatBox.innerHTML += `<div class="text-left"><span class="bg-slate-900 border border-slate-800 px-3 py-1.5 rounded-xl inline-block max-w-[85%] text-slate-200"><b>Джайм:</b><br>${formattedReply}</span></div>`;
            } catch (err) {
                chatBox.innerHTML += `<div class="text-left"><span class="bg-red-950 border border-red-800 text-red-300 px-3 py-1.5 rounded-xl inline-block">⚠️ Сбой сети. Отправь запрос еще раз!</span></div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function searchMusic() {
            const input = document.getElementById('music-input');
            const resultsBox = document.getElementById('music-results');
            if(!input.value.trim()) return;

            if (appState.premiumExpires <= Date.now() && appState.musicLimits <= 0) {
                alert("❌ Исчерпан лимит музыки!");
                return;
            }

            resultsBox.innerHTML = '<div class="text-center text-slate-400 py-6">Загрузка аудиотеки...</div>';

            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(input.value)}&media=music&limit=5`);
                const data = await res.json();
                resultsBox.innerHTML = '';

                if(data.results && data.results.length > 0) {
                    if (appState.premiumExpires <= Date.now()) {
                        appState.musicLimits--;
                        safeSet('jaime_lim_music', appState.musicLimits);
                    }
                    data.results.forEach(track => {
                        resultsBox.innerHTML += `
                            <div class="bg-slate-900 border border-slate-800 p-3 rounded-xl flex flex-col gap-2">
                                <div class="font-bold text-slate-100">${track.trackName} (${track.artistName})</div>
                                <audio src="${track.previewUrl}" loop controls class="w-full h-8 rounded-lg bg-slate-800"></audio>
                            </div>
                        `;
                    });
                } else { resultsBox.innerHTML = '<div class="text-center text-slate-500 py-6">Не найдено.</div>'; }
            } catch(e) { resultsBox.innerHTML = '<div class="text-center text-red-400 py-6">Ошибка загрузки.</div>'; }
        }

        function generateMedia(type) {
            const promptInput = document.getElementById('media-prompt');
            const outputBox = document.getElementById('media-output');
            if(!promptInput.value.trim()) return;

            if (type === 'video' && appState.premiumExpires <= Date.now()) {
                alert("🔒 Видео доступно только в Premium!");
                return;
            }
            if (appState.premiumExpires <= Date.now() && appState.photoLimits <= 0) {
                alert("❌ Дождитесь обновления лимитов или купите Премиум.");
                return;
            }

            outputBox.innerHTML = `<div class="text-center text-xs text-amber-400 animate-pulse">Генерация ${type === 'photo' ? 'фото' : 'видео'}...</div>`;

            if (appState.premiumExpires <= Date.now()) {
                appState.photoLimits--;
                safeSet('jaime_lim_photo', appState.photoLimits);
            }

            const seed = Math.floor(Math.random() * 99999);
            if (type === 'photo') {
                const imgUrl = `https://image.pollinations.ai/p/${encodeURIComponent(promptInput.value)}?width=1024&height=1024&seed=${seed}&nologo=true`;
                const img = new Image();
                img.src = imgUrl;
                img.className = "w-full h-auto max-h-64 object-cover rounded-xl";
                img.onload = () => { outputBox.innerHTML = ''; outputBox.appendChild(img); };
            } else {
                setTimeout(() => {
                    outputBox.innerHTML = `
                        <div class="w-full text-center space-y-2">
                            <span class="text-emerald-400 text-[11px]">✓ Рендеринг видео завершен</span>
                            <img src="https://image.pollinations.ai/p/${encodeURIComponent(promptInput.value)}?width=600&height=400&seed=${seed}" class="w-full h-40 object-cover rounded-xl opacity-80 border border-slate-700">
                        </div>`;
                }, 3000);
            }
        }

        function clearAppData() { 
            try { localStorage.clear(); } catch(e){} 
            location.reload(); 
        }

        // Принудительная активация режима по умолчанию при старте
        setAiMode(appState.aiMode);
    </script>
</body>
</html>
